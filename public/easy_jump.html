<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easy Jump</title>
<style>
  :root{
    --neon:#00FF88;
    --neon-dim:#00B55C;
    --danger:#ff3b3b;
    --cream:#eef1ee;
  }
  html,body{
    margin:0; padding:0; height:100%;
    background:radial-gradient(ellipse at 50% 0%, #0d2417 0%, #050d09 70%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Segoe UI', system-ui, sans-serif;
    overscroll-behavior:none;
    touch-action:none;
  }
  #wrap{
    position:relative;
    width:480px; height:832px;
    max-width:100vw; max-height:100vh;
    box-shadow:0 0 60px rgba(0,255,136,0.15);
    border-radius:18px;
    overflow:hidden;
    border:1px solid rgba(0,255,136,0.25);
  }
  canvas{ display:block; background:transparent; }

  #touchLayer{
    position:absolute; inset:0; z-index:4; cursor:grab;
  }
  #touchLayer:active{ cursor:grabbing; }

  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 18px; box-sizing:border-box;
    pointer-events:none;
    z-index:5;
  }
  #score{
    color:var(--neon); font-weight:800; font-size:28px;
    text-shadow:0 0 12px rgba(0,255,136,0.8);
    letter-spacing:1px;
  }
  #best{
    color:rgba(238,241,238,0.55); font-size:13px; font-weight:600;
    text-align:right;
  }
  #hint{
    position:absolute; bottom:18px; left:0; right:0;
    text-align:center; color:rgba(238,241,238,0.4);
    font-size:12px; letter-spacing:0.5px;
    pointer-events:none; z-index:5;
    transition:opacity 0.4s;
  }

  #overlay{
    position:absolute; inset:0;
    background:rgba(4,16,9,0.88);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:var(--cream); text-align:center;
    z-index:10; padding:0 30px; box-sizing:border-box;
  }
  #overlay h1{
    color:var(--neon); font-size:36px; margin:0 0 6px 0;
    text-shadow:0 0 18px rgba(0,255,136,0.7);
    letter-spacing:1px;
  }
  #overlay p{ margin:4px 0 22px 0; color:rgba(238,241,238,0.75); font-size:14.5px; line-height:1.5; }
  #overlay p b{ color:var(--neon); }
  #overlay p .r{ color:var(--danger); }
  #finalScore{ font-size:20px; color:var(--neon); font-weight:700; margin-bottom:20px; }
  #playBtn{
    background:var(--neon); color:#04170c; border:none;
    font-weight:800; font-size:17px; padding:14px 38px;
    border-radius:30px; cursor:pointer;
    box-shadow:0 0 22px rgba(0,255,136,0.55);
  }
  #playBtn:active{ transform:scale(0.97); }
  #logo{
    font-weight:900; font-size:15px; color:var(--neon);
    letter-spacing:2px; text-transform:lowercase;
    margin-bottom:2px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="832"></canvas>
  <div id="touchLayer"></div>

  <div id="hud">
    <div id="score">0</div>
    <div id="best">BEST<br><span id="bestVal">0</span></div>
  </div>
  <div id="hint">drag left / right to steer</div>

  <div id="overlay">
    <div id="logo">easy.</div>
    <h1 id="titleText">EASY JUMP</h1>
    <p id="subText">Tap and drag your finger left or right to steer.<br>
    Platforms with a <b>green rod</b> boost you higher for bonus points.<br>
    Platforms marked <span class="r">red</span> are slippery — you'll slide. Steer back onto a platform or fall.</p>
    <div id="finalScore" style="display:none;"></div>
    <button id="playBtn">PLAY</button>
  </div>
</div>

  let player, platforms, score, cameraY, running;
  let pointerActive = false, pointerX = null, lastPointerX = null;
  let slipTimer = 0, slipDir = 0;

  function resetGame(){
    player = { x: W/2 - PLAYER_W/2, y: H - 160, vy: BOUNCE_V, vx: 0, facing: 1 };
    platforms = [];
    score = 0;
    cameraY = 0;
    running = true;
    pointerActive = false; pointerX = null;
    slipTimer = 0; slipDir = 0;

    platforms.push({x: W/2 - PLAT_W/2, y: H - 100, type:'normal', vx:0});

    let y = H - 100;
    while (y > -H){
      y -= 70 + Math.random()*40;
      platforms.push(makePlatform(y));
    }
  }

  function makePlatform(y){
    const x = Math.random() * (W - PLAT_W);
    const r = Math.random();
    let type = 'normal';
    if (r < 0.16) type = 'boost';
    else if (r < 0.28) type = 'danger';
    return { x, y, type, vx: 0 };
  }

  function pointerPos(e){
    const rect = touchLayer.getBoundingClientRect();
    const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
    return (clientX - rect.left) * (W / rect.width);
  }

  function onDown(e){
    e.preventDefault();
    pointerActive = true;
    pointerX = pointerPos(e);
    lastPointerX = pointerX;
    hint.style.opacity = '0';
  }
  function onMove(e){
    if (!pointerActive) return;
    e.preventDefault();
    pointerX = pointerPos(e);
  }
  function onUp(e){ pointerActive = false; }

  touchLayer.addEventListener('mousedown', onDown);
  touchLayer.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  touchLayer.addEventListener('touchstart', onDown, {passive:false});
  touchLayer.addEventListener('touchmove', onMove, {passive:false});
  touchLayer.addEventListener('touchend', onUp);
  touchLayer.addEventListener('touchcancel', onUp);

  playBtn.addEventListener('click', ()=>{
    overlay.style.display = 'none';
    hint.style.opacity = '1';
    resetGame();
    lastTime = performance.now();
    requestAnimationFrame(loop);
  });

  function drawBear(x, y, w, h, facing, vy, slipping){
    let img = bearImg, ready = bearLoaded;
    if (slipping && runLoaded){ img = runImg; ready = true; }
    else if (vy < -2 && jumpLoaded){ img = jumpImg; ready = true; }

    if (!ready){
      ctx.save();
      ctx.fillStyle = 'rgba(0,255,136,0.4)';
      roundRect(ctx, x, y, w, h, 12);
      ctx.fill();
      ctx.restore();
      return;
    }

    ctx.save();
    ctx.translate(x + w/2, y + h/2);
    ctx.scale(facing, 1);
    const stretch = Math.max(0.72, Math.min(1.28, 1 - vy*0.012));
    ctx.scale(1/Math.sqrt(stretch), stretch);

    ctx.shadowColor = slipping ? 'rgba(255,59,59,0.9)' : 'rgba(0,255,136,0.75)';
    ctx.shadowBlur = 16;

    const iw = img.naturalWidth, ih = img.naturalHeight;
    const fitScale = Math.min(w / iw, h / ih) * 1.35;
    const drawW = iw * fitScale;
    const drawH = ih * fitScale;

    ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
    ctx.shadowBlur = 0;

    if (slipping){
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = 'rgba(255,40,40,0.35)';
      ctx.fillRect(-drawW/2, -drawH/2, drawW, drawH);
      ctx.globalCompositeOperation = 'source-over';
    }

    ctx.restore();
  }

  function drawPlatform(p){
    const y = p.y - cameraY;
    if (y < -40 || y > H + 40) return;
    ctx.save();

    if (p.type === 'boost'){
      ctx.shadowColor = 'rgba(0,255,136,0.7)';
      ctx.shadowBlur = 14;
      const grad = ctx.createLinearGradient(p.x, 0, p.x+PLAT_W, 0);
      grad.addColorStop(0, '#5be89a');
      grad.addColorStop(1, '#0fbf6c');
      ctx.fillStyle = grad;
    } else if (p.type === 'danger'){
      ctx.shadowColor = 'rgba(255,59,59,0.7)';
      ctx.shadowBlur = 14;
      const grad = ctx.createLinearGradient(p.x, 0, p.x+PLAT_W, 0);
      grad.addColorStop(0, '#ff8080');
      grad.addColorStop(1, '#d62b2b');
      ctx.fillStyle = grad;
    } else {
      ctx.shadowColor = 'rgba(0,255,136,0.6)';
      ctx.shadowBlur = 10;
      const grad = ctx.createLinearGradient(p.x, 0, p.x+PLAT_W, 0);
      grad.addColorStop(0, '#5be89a');
      grad.addColorStop(1, '#0fbf6c');
      ctx.fillStyle = grad;
    }
    roundRect(ctx, p.x, y, PLAT_W, PLAT_H, 8);
    ctx.fill();

    if (p.type === 'boost'){
      ctx.fillStyle = '#00FF88';
      ctx.shadowColor = 'rgba(0,255,136,0.9)';
      ctx.shadowBlur = 12;
      roundRect(ctx, p.x + PLAT_W/2 - 4, y - 22, 8, 22, 3);
      ctx.fill();
    } else if (p.type === 'danger'){
      ctx.strokeStyle = 'rgba(80,0,0,0.5)';
      ctx.lineWidth = 3;
      for (let i=-1;i<3;i++){
        ctx.beginPath();
        ctx.moveTo(p.x + i*14, y+PLAT_H);
        ctx.lineTo(p.x + i*14 + 10, y);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function drawBackground(){
    ctx.clearRect(0,0,W,H);
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#0d2417');
    grad.addColorStop(1, '#040d09');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.globalAlpha = 0.35;
    for (let i=0;i<26;i++){
      const px = (i * 137) % W;
      const py = ((i * 89) - cameraY*0.4) % (H+40);
      const yy = py < 0 ? py + H + 40 : py;
      const size = (i % 3) + 1;
      ctx.fillStyle = '#00FF88';
      ctx.beginPath();
      ctx.arc(px, yy, size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  let lastTime = 0;

  function update(dt){
    if (!running) return;

    if (slipTimer > 0){
      slipTimer -= dt;
      player.vx = slipDir * 6.5;
      player.facing = slipDir >= 0 ? 1 : -1;
      player.x += player.vx * dt * 60;
    } else if (pointerActive && pointerX !== null){
      const target = pointerX - PLAYER_W/2;
      const dx = pointerX - lastPointerX;
      if (Math.abs(dx) > 0.5) player.facing = dx > 0 ? 1 : -1;
      lastPointerX = pointerX;
      player.vx = (target - player.x);
      player.x += (target - player.x) * FOLLOW_LERP;
    } else {
      player.vx *= 0.9;
      player.x += player.vx * dt * 60 * 0.15;
    }

    if (player.x + PLAYER_W < 0) player.x = W;
    if (player.x > W) player.x = -PLAYER_W;

    player.vy += GRAVITY * dt * 60;
    player.y += player.vy * dt * 60;

    if (player.vy > 0){
      for (const p of platforms){
        const px = player.x, py = player.y + PLAYER_H;
        const prevPy = py - player.vy * dt * 60;
        if (px + PLAYER_W*0.65 > p.x && px + PLAYER_W*0.35 < p.x + PLAT_W){
          if (prevPy <= p.y + 6 && py >= p.y){
            if (p.type === 'boost'){
              player.vy = BOOST_BOUNCE_V;
              player.y = p.y - PLAYER_H;
              score += 25;
              slipTimer = 0;
            } else if (p.type === 'danger'){
              player.vy = BOUNCE_V * 0.45;
              player.y = p.y - PLAYER_H;
              slipTimer = 0.55;
              slipDir = (player.x + PLAYER_W/2 < p.x + PLAT_W/2) ? -1 : 1;
              if (Math.random() < 0.15) slipDir *= -1;
            } else {
              player.vy = BOUNCE_V;
              player.y = p.y - PLAYER_H;
              slipTimer = 0;
            }
          }
        }
      }
    }

    const screenY = player.y - cameraY;
    if (screenY < H*0.42){
      const diff = H*0.42 - screenY;
      cameraY -= diff;
      score += diff * 0.1;
    }

    let maxTop = Math.min(...platforms.map(p=>p.y));
    for (const p of platforms){
      if (p.y - cameraY > H + 60){
        p.y = maxTop - (70 + Math.random()*40);
        const np = makePlatform(p.y);
        p.x = np.x; p.type = np.type;
        maxTop = p.y;
      }
    }

    if (player.y - cameraY > H + 60){
      endGame();
    }

    scoreEl.textContent = Math.floor(score);
  }

  function endGame(){
    running = false;
    const finalScore = Math.floor(score);
    if (finalScore > best){
      best = finalScore;
      window.__easyJumpBest = best;
      bestValEl.textContent = best;
      try { localStorage.setItem('easyJumpBest', String(best)); } catch (e) {}
    }
    titleText.textContent = 'GAME OVER';
    subText.innerHTML = 'You climbed pretty far!';
    finalScoreEl.style.display = 'block';
    finalScoreEl.textContent = 'Score: ' + finalScore;
    playBtn.textContent = 'PLAY AGAIN';
    overlay.style.display = 'flex';
    // Report the score to the host app (easy Games leaderboard) when embedded.
    if (typeof window.__easyGameEnd === 'function') {
      try { window.__easyGameEnd(finalScore); } catch (e) {}
    }
  }

  function render(){
    drawBackground();
    for (const p of platforms) drawPlatform(p);
    drawBear(player.x, player.y - cameraY, PLAYER_W, PLAYER_H, player.facing, player.vy, slipTimer > 0);
  }

  function loop(now){
    const dt = Math.min((now - lastTime) / 1000, 1/30);
    lastTime = now;
    update(dt);
    render();
    if (running) requestAnimationFrame(loop);
  }

  resetGame();
  render();
  running = false;
})();
</script>
</body>

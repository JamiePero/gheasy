<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- easy share card (1200x630). Dark-green brand background, "e" mark,
       wordmark and tagline. Export to og-cover.png for full social/WhatsApp
       compatibility, then point config.js OG_IMAGE at the PNG. -->
  <rect width="1200" height="630" fill="#050f05"/>
  <circle cx="1010" cy="110" r="340" fill="#22C55E" opacity="0.10"/>
  <circle cx="1120" cy="560" r="200" fill="#22C55E" opacity="0.07"/>

  <g transform="translate(150 150) scale(3.1)">
    <g fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round">
      <path d="M44 26 A14 14 0 1 0 46 40"/>
      <path d="M30 33 H45"/>
    </g>
    <circle cx="20.5" cy="41.5" r="5" fill="#22C55E"/>
  </g>

  <text x="150" y="445" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="150" font-weight="800" letter-spacing="-5" fill="#ffffff">easy</text>
  <text x="156" y="512" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="42" font-weight="600" fill="#9fe6b8">Buy data. No login. Instant delivery.</text>
  <text x="156" y="566" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#5f8c6f">MTN · Telecel · AirtelTigo  ·  gheasy.com</text>
</svg>

<!doctype html>
<html lang="en-GH" style="background-color: #050f05">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <!-- Content Security Policy (D4) — allowlists exactly the origins the app uses:
         GA/GTM, Google Fonts + Fontshare, the getflashx API, Firebase Storage
         images, and the Paystack checkout. 'unsafe-inline' is required for the
         theme/GA bootstrap + Tailwind styles (SSG makes nonces impractical). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src 'self' data: https://fonts.gstatic.com https://api.fontshare.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.getflashx.com https://www.google-analytics.com https://www.googletagmanager.com https://region1.google-analytics.com; frame-src https://checkout.paystack.com; base-uri 'self'; object-src 'none';"
    />
    <meta name="theme-color" content="#050f05" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#d2dcdd" media="(prefers-color-scheme: light)" />
    <!-- PWA / iOS standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GhEasy" />
    <!-- Title, description, Open Graph & Twitter tags are injected per-page by
         <Seo> (react-helmet via vite-react-ssg), so they're not duplicated here. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Admin PWA bootstrap: on /admin ONLY, swap to the standalone admin
         manifest + iOS title before paint, and capture the install prompt for
         the in-page "Install Admin App" button. Customer pages return early, so
         the main easy PWA manifest and install flow are completely untouched. -->
    <script>
      (function () {
        try {
          if (!location.pathname.startsWith('/admin')) return;
          var m = document.querySelector('link[rel="manifest"]');
          if (m) m.setAttribute('href', '/admin-manifest.json');
          var t = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (t) t.setAttribute('content', 'easy Admin');
          window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            window.__adminInstallPrompt = e;
            window.dispatchEvent(new Event('admin-install-ready'));
          });
        } catch (e) {}
      })();
    </script>

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G8SFJSCPXE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G8SFJSCPXE');
    </script>

    <!-- Prevent theme flash: apply stored/system theme before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('gheasy-theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (t === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>

    <!-- Type: Geist (headings) + Satoshi (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap"
      rel="stylesheet"
    />

    <!-- Organization + WebSite JSON-LD is injected per-page by <Seo> (homepage),
         so it's not duplicated statically here. -->
  </head>
  <body>
    <!-- First-paint cover so the splash background is the very first thing
         visible (no blank flash). The app removes it once the splash is ready.
         Contains a hidden fallback that appears if the JS bundle never mounts —
         users must never sit on a blank screen. -->
    <div id="boot-splash" style="position:fixed;inset:0;background-color:#050f05;z-index:9998">
      <div id="boot-fallback" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
        <p style="margin:0;color:#ffffff;font-size:17px;font-weight:600">Loading easy…</p>
        <p style="margin:0;color:#9fb8a8;font-size:13px">Taking longer than usual.</p>
        <button onclick="window.location.reload()" style="margin-top:6px;height:46px;padding:0 36px;border:0;border-radius:16px;background:#22C55E;color:#ffffff;font-size:15px;font-weight:600;cursor:pointer">Refresh</button>
      </div>
    </div>
    <noscript>
      <div style="position:fixed;inset:0;z-index:9999;background:#050f05;color:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;font-family:system-ui,sans-serif;padding:0 24px">
        <p style="margin:0;font-size:17px;font-weight:600">easy needs JavaScript</p>
        <p style="margin:0;color:#9fb8a8;font-size:13px">Please enable JavaScript in your browser and refresh this page.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Boot safety net:
      //  • 5s — if the app hasn't mounted (root still empty), reveal the
      //    branded "Loading easy… [Refresh]" fallback inside the boot cover.
      //  • 10s — remove the boot cover ONLY when the app actually mounted;
      //    if it never mounted, the fallback stays (never a blank screen).
      setTimeout(function () {
        var r = document.getElementById('root');
        var f = document.getElementById('boot-fallback');
        if (f && (!r || !r.firstChild)) f.style.display = 'flex';
      }, 5000);
      setTimeout(function () {
        var b = document.getElementById('boot-splash');
        var r = document.getElementById('root');
        if (b && r && r.firstChild) b.remove();
      }, 10000);
    </script>
  </body>
</html>

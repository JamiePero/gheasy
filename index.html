<!doctype html>
<html lang="en-GH" style="background-color: #050f05">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#030706" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#d2dcdd" media="(prefers-color-scheme: light)" />
    <!-- Title, description, Open Graph & Twitter tags are injected per-page by
         <Seo> (react-helmet via vite-react-ssg), so they're not duplicated here. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/easytra.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G8SFJSCPXE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G8SFJSCPXE');
    </script>

    <!-- Prevent theme flash: apply stored/system theme before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('gheasy-theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (t === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>

    <!-- Type: Geist (headings) + Satoshi (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap"
      rel="stylesheet"
    />

    <!-- Organization structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "GhEasy",
        "url": "https://gheasy.com",
        "logo": "https://gheasy.com/easytra.png",
        "description": "Ghana's easiest way to buy MTN, Telecel and AirtelTigo data bundles. No login required. Pay via Mobile Money.",
        "areaServed": { "@type": "Country", "name": "Ghana" },
        "contactPoint": { "@type": "ContactPoint", "contactType": "customer support", "availableLanguage": "English" }
      }
    </script>
  </head>
  <body>
    <!-- First-paint cover so the splash background is the very first thing
         visible (no blank flash). The app removes it once the splash is ready. -->
    <div id="boot-splash" style="position:fixed;inset:0;background-color:#050f05;z-index:9998"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Safety net: if the app never mounts, drop the boot cover after 10s.
      setTimeout(function () {
        var b = document.getElementById('boot-splash');
        if (b) b.remove();
      }, 10000);
    </script>
  </body>
</html>
